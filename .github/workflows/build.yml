name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/.android/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/.android/cmdline-tools
          mv $HOME/.android/cmdline-tools/cmdline-tools $HOME/.android/cmdline-tools/latest
          
          # Variables de entorno para que Buildozer reconozca nuestra instalación
          echo "ANDROID_HOME=$HOME/.android" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/.android/cmdline-tools/latest/bin" >> $GITHUB_ENV

      - name: Accept Licenses and Install SDK components
        run: |
          yes | $HOME/.android/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/.android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev python3-pip
          pip3 install --user --upgrade buildozer

      - name: Build with Buildozer
        run: |
          # Buildozer ahora usará el SDK que acabamos de instalar manualmente
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
