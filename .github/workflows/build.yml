name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/ndk
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk
          pip3 install --user --upgrade buildozer cython

      - name: Build with Buildozer
        run: |
          # Limpiamos el caché local para forzar que use las nuevas rutas
          rm -rf .buildozer
          # Ejecutamos con las variables de entorno de rutas configuradas
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk          path: bin/*.apk
