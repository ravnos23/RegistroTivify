name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses6 libncurses6:i386 cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk
          pip3 install --user --upgrade buildozer

      - name: Setup Android SDK manually
        run: |
          mkdir -p $HOME/.android/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/.android/cmdline-tools
          mv $HOME/.android/cmdline-tools/cmdline-tools $HOME/.android/cmdline-tools/latest
          yes | $HOME/.android/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/.android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Build with Buildozer
        env:
          ANDROID_HOME: /home/runner/.android
        run: |
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
