name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev python3-pip \
            openjdk-17-jdk

      - name: Install Python Dependencies
        run: pip3 install --user --upgrade buildozer cython

      - name: Build with Buildozer
        run: |
          # Solo dejamos que buildozer trabaje. 
          # No borramos nada, no forzamos nada.
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
