name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Definimos las rutas del SDK preinstalado en GitHub
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/ndk
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk
          pip3 install --user --upgrade buildozer cython

      - name: Link Android SDK
        run: |
          # Creamos los directorios que Buildozer espera
          mkdir -p /home/runner/.buildozer/android/platform
          # Creamos un enlace simbólico (un "atajo") para que Buildozer use el SDK del sistema
          ln -s /usr/local/lib/android/sdk /home/runner/.buildozer/android/platform/android-sdk
          ln -s /usr/local/lib/android/ndk /home/runner/.buildozer/android/platform/android-ndk

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk          name: package
          path: bin/*.apk
